# Structure file inside inputs/md/ or relative/absolute path
structure_file: POSCAR-1
# Or use a batch selection instead:
# structure_files:
#   - POSCAR-160
#   - POSCAR-161
# structure_glob: "POSCAR-*"

# Use null to run all models found in model/
selected_models: null

device: cpu
default_dtype: float32
output_name: nvt
trajectory_file: trajectory.extxyz
trajectory_format: extxyz
# Or write several trajectory formats at once:
# trajectory_files:
#   - file: trajectory.traj
#     format: traj
#   - file: trajectory.extxyz
#     format: extxyz
final_structure_file: final_structure.extxyz
final_structure_format: extxyz
# Or write several final-structure formats at once:
# final_structure_files:
#   - file: final_structure.traj
#     format: traj
#   - file: final_structure.extxyz
#     format: extxyz
save_final_structure: true
log_file: run.log
append_log: false
log_fields:
  - step
  - time_fs
  - temperature_K
  - potential_energy_eV
  - kinetic_energy_eV
  - total_energy_eV
append_trajectory: true
trajectory_interval: 10
enable_stopcar: true
stopcar_file: STOPCAR
stop_check_interval: 1
stop_on_custom_condition: false
# stop_condition_module: my_stop_conditions
# stop_condition_function: should_stop
# create_stopcar_on_custom_condition: true

# Example custom distances to include in run.log:
# monitored_distances:
#   - name: NO_bond
#     kind: atom_distance
#     atom_indices: [1, 2]
#     index_base: 1
#   - name: NO_surface_height
#     kind: average_z_distance
#     group_a_indices: [1, 2]
#     group_b_indices: [259, 260, 261, 262]
#     index_base: 1

thermostat: nose-hoover
temperature_k: 15.0
time_step_fs: 1.0
steps: 2000

# nose-hoover options
tdamp_fs: 100.0
tchain: 3
tloop: 1

# langevin option
friction: 0.02

# berendsen / bussi option
taut_fs: 100.0

# velocity initialization
initialize_velocities: true
remove_translation: true
remove_rotation: true

log_interval: 1
