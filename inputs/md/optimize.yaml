# Structure file inside inputs/md/
structure_file: POSCAR-1
# Or use a batch selection instead:
# structure_files:
#   - POSCAR-160
#   - POSCAR-161
# structure_glob: "POSCAR-*"

# Use null to run all models found in model/
selected_models: null

device: cpu
default_dtype: float32
output_name: optimize
trajectory_file: trajectory.extxyz
trajectory_format: extxyz
# Or write several trajectory formats at once:
# trajectory_files:
#   - file: trajectory.traj
#     format: traj
#   - file: trajectory.extxyz
#     format: extxyz
final_structure_file: final_structure.extxyz
final_structure_format: extxyz
# Or write several final-structure formats at once:
# final_structure_files:
#   - file: final_structure.traj
#     format: traj
#   - file: final_structure.extxyz
#     format: extxyz
save_final_structure: true
log_file: run.log
append_log: false
log_fields:
  - step
  - potential_energy_eV
  - max_force_eV_A
append_trajectory: true
trajectory_interval: 10
optimizer_log_file: optimizer.log
optimizer_restart_file: optimizer.restart
enable_stopcar: true
stopcar_file: STOPCAR
stop_check_interval: 1
stop_on_custom_condition: false
# stop_condition_module: my_stop_conditions
# stop_condition_function: should_stop
# create_stopcar_on_custom_condition: true

optimizer: fire
fmax: 0.01
# Require this many successive optimizer steps below fmax before declaring convergence.
fmax_consecutive: 3
# Optional: additionally require |E(n) - E(n-1)| <= this value in eV.
# energy_tolerance_eV: 1.0e-5
# Maximum displacement of one atom during a single optimizer step, in A.
maxstep_a: 0.10
# Optional safety stop if any atom moves farther than this from its initial position.
# max_total_displacement_a: 2.0
# Optimizer-specific ASE options. They override generic settings when duplicated.
# optimizer_options:
#   memory: 100       # LBFGS / PreconLBFGS
#   damping: 1.0      # LBFGS / PreconLBFGS
#   use_line_search: false
#   downhill_check: true  # FIRE
steps: 300
log_interval: 10
